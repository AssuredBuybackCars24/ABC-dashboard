<!DOCTYPE html>
<html>
<head>
  <title>Leaderboard</title>
</head>
<body>

<h2>Live Leaderboard</h2>
<table border="1" id="table"></table>

<script>
fetch("https://docs.google.com/spreadsheets/d/e/2PACX-1vT2f8gS7ofkQ9Ztv6eqXFAH8i6KJHrCEH6FZQrH3KFFH2w7CkRekpSUlVyiFAw1CPnbXKWv5uh5q4Jy/pub?output=csv")
  .then(response => response.text())
  .then(data => {
    const rows = data.split("\n").map(r => r.split(","));
    let html = "";

    rows.forEach((row, i) => {
      html += "<tr>";
      row.forEach(col => {
        html += i === 0 ? `<th>${col}</th>` : `<td>${col}</td>`;
      });
      html += "</tr>";
    });

    document.getElementById("table").innerHTML = html;
  });
</script>

</body>
</html>
